<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards — Marché Libre</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f17;
    --surface: #161a27;
    --surface2: #1e2336;
    --border: #2a2f45;
    --brand: #6366f1;
    --brand2: #8b5cf6;
    --accent: #06b6d4;
    --green: #10b981;
    --orange: #f59e0b;
    --red: #ef4444;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --card-h: 380px;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 60px;
  }

  /* ── HEADER ── */
  header {
    width: 100%;
    max-width: 860px;
    margin-bottom: 32px;
    text-align: center;
  }

  header h1 {
    font-size: 2rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--brand), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
  }

  header p { color: var(--muted); font-size: 0.9rem; }

  /* ── STATS BAR ── */
  .stats-bar {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }

  .stat-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 6px 16px;
    font-size: 0.8rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .stat-chip .dot { width: 8px; height: 8px; border-radius: 50%; }

  /* ── FILTERS ── */
  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 28px;
    max-width: 860px;
  }

  .filter-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 999px;
    padding: 7px 18px;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }

  .filter-btn:hover { border-color: var(--brand); color: var(--text); }
  .filter-btn.active {
    background: var(--brand);
    border-color: var(--brand);
    color: #fff;
  }

  /* ── PROGRESS ── */
  .progress-wrap {
    width: 100%;
    max-width: 600px;
    margin-bottom: 24px;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .progress-bar {
    height: 6px;
    background: var(--surface2);
    border-radius: 999px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--brand), var(--accent));
    border-radius: 999px;
    transition: width 0.4s ease;
  }

  /* ── CARD SCENE ── */
  .scene {
    width: 100%;
    max-width: 620px;
    height: var(--card-h);
    perspective: 1200px;
    cursor: pointer;
    margin-bottom: 24px;
  }

  .card {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.65s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 20px;
    padding: 36px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    border: 1px solid var(--border);
    overflow-y: auto;
  }

  .card-front {
    background: linear-gradient(145deg, var(--surface), var(--surface2));
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
  }

  .card-back {
    transform: rotateY(180deg);
    background: linear-gradient(145deg, #1a1040, #0d1a30);
    box-shadow: 0 20px 60px rgba(99,102,241,0.2), inset 0 1px 0 rgba(255,255,255,0.05);
    border-color: rgba(99,102,241,0.3);
    text-align: left;
    align-items: flex-start;
    justify-content: flex-start;
    padding-top: 28px;
  }

  .card-category {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 999px;
    margin-bottom: 20px;
  }

  .card-question {
    font-size: 1.35rem;
    font-weight: 700;
    line-height: 1.4;
    color: var(--text);
  }

  .card-hint {
    margin-top: 20px;
    color: var(--muted);
    font-size: 0.8rem;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .card-hint::before { content: '👆'; }

  .back-category {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 999px;
    margin-bottom: 16px;
  }

  .back-title {
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 16px;
    line-height: 1.35;
  }

  .back-content {
    font-size: 0.88rem;
    line-height: 1.7;
    color: #cbd5e1;
    width: 100%;
  }

  .back-content strong { color: var(--text); font-weight: 600; }
  .back-content em { color: var(--accent); font-style: normal; }

  .back-content ul {
    list-style: none;
    padding: 0;
    margin-top: 10px;
  }

  .back-content ul li {
    padding: 4px 0;
    padding-left: 18px;
    position: relative;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .back-content ul li::before {
    content: '→';
    position: absolute;
    left: 0;
    color: var(--brand);
    font-size: 0.8rem;
  }

  .back-content code {
    background: rgba(99,102,241,0.15);
    border: 1px solid rgba(99,102,241,0.2);
    padding: 2px 7px;
    border-radius: 5px;
    font-family: 'Courier New', monospace;
    font-size: 0.82em;
    color: #a5b4fc;
  }

  /* ── CONTROLS ── */
  .controls {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 20px;
  }

  .btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 12px;
    padding: 12px 24px;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn:hover { border-color: var(--brand); transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }

  .btn-primary {
    background: linear-gradient(135deg, var(--brand), var(--brand2));
    border-color: transparent;
    color: #fff;
  }

  .btn-primary:hover { box-shadow: 0 8px 24px rgba(99,102,241,0.4); }

  .card-counter {
    font-weight: 700;
    font-size: 1.1rem;
    color: var(--text);
    min-width: 80px;
    text-align: center;
  }

  /* ── SHUFFLE / RESET ── */
  .actions-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }

  /* ── CATEGORY COLORS ── */
  .cat-backend   { background: rgba(239,68,68,0.15); color: #f87171; }
  .cat-frontend  { background: rgba(6,182,212,0.15); color: #22d3ee; }
  .cat-database  { background: rgba(245,158,11,0.15); color: #fbbf24; }
  .cat-archi     { background: rgba(99,102,241,0.15); color: #a5b4fc; }
  .cat-securite  { background: rgba(16,185,129,0.15); color: #34d399; }
  .cat-devops    { background: rgba(139,92,246,0.15); color: #c4b5fd; }
  .cat-conception { background: rgba(236,72,153,0.15); color: #f9a8d4; }
  .cat-algo      { background: rgba(249,115,22,0.15); color: #fb923c; }

  /* ── KNOWN/UNKNOWN ── */
  .rating-row {
    display: flex;
    gap: 12px;
    margin-top: 4px;
  }

  .btn-known {
    flex: 1;
    background: rgba(16,185,129,0.15);
    border-color: rgba(16,185,129,0.3);
    color: var(--green);
    justify-content: center;
  }

  .btn-known:hover { background: rgba(16,185,129,0.25); border-color: var(--green); }

  .btn-unknown {
    flex: 1;
    background: rgba(239,68,68,0.1);
    border-color: rgba(239,68,68,0.2);
    color: var(--red);
    justify-content: center;
  }

  .btn-unknown:hover { background: rgba(239,68,68,0.2); border-color: var(--red); }

  /* ── SCORE ── */
  .score-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-top: 8px;
  }

  .score-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 20px;
    text-align: center;
    font-size: 0.78rem;
  }

  .score-item strong { display: block; font-size: 1.3rem; font-weight: 800; }
  .score-item.known strong { color: var(--green); }
  .score-item.unknown strong { color: var(--red); }
  .score-item.remain strong { color: var(--accent); }

  @media (max-width: 480px) {
    header h1 { font-size: 1.5rem; }
    .card-question { font-size: 1.1rem; }
    :root { --card-h: 420px; }
    .card-back { padding: 20px; }
  }
</style>
</head>
<body>

<header>
  <h1>🗂️ Flashcards — Marché Libre</h1>
  <p>Clique sur une carte pour révéler la réponse · Note-toi honnêtement</p>
</header>

<div class="stats-bar">
  <div class="stat-chip"><div class="dot" style="background:#f87171"></div>Backend</div>
  <div class="stat-chip"><div class="dot" style="background:#22d3ee"></div>Frontend</div>
  <div class="stat-chip"><div class="dot" style="background:#fbbf24"></div>Base de données</div>
  <div class="stat-chip"><div class="dot" style="background:#a5b4fc"></div>Architecture</div>
  <div class="stat-chip"><div class="dot" style="background:#34d399"></div>Sécurité</div>
  <div class="stat-chip"><div class="dot" style="background:#c4b5fd"></div>DevOps</div>
  <div class="stat-chip"><div class="dot" style="background:#f9a8d4"></div>Conception</div>
  <div class="stat-chip"><div class="dot" style="background:#fb923c"></div>Algorithme</div>
</div>

<div class="filters" id="filters"></div>

<div class="progress-wrap">
  <div class="progress-label">
    <span id="progress-text">Carte 1 sur 45</span>
    <span id="progress-pct">0%</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
</div>

<div class="scene" id="scene" onclick="flipCard()">
  <div class="card" id="card">
    <div class="card-face card-front" id="front-face">
      <span class="card-category" id="front-cat"></span>
      <div class="card-question" id="front-q"></div>
      <div class="card-hint">Clique pour voir la réponse</div>
    </div>
    <div class="card-face card-back" id="back-face">
      <span class="back-category" id="back-cat"></span>
      <div class="back-title" id="back-title"></div>
      <div class="back-content" id="back-content"></div>
    </div>
  </div>
</div>

<div class="rating-row" style="width:100%;max-width:620px;margin-bottom:20px" id="rating-row">
  <button class="btn btn-unknown" onclick="rate(false)">❌ À revoir</button>
  <button class="btn btn-known" onclick="rate(true)">✅ Je sais !</button>
</div>

<div class="controls">
  <button class="btn" onclick="prev()">← Précédent</button>
  <div class="card-counter" id="counter">1 / 45</div>
  <button class="btn btn-primary" onclick="next()">Suivant →</button>
</div>

<div class="score-row">
  <div class="score-item known"><strong id="s-known">0</strong>Sus</div>
  <div class="score-item unknown"><strong id="s-unknown">0</strong>À revoir</div>
  <div class="score-item remain"><strong id="s-remain">45</strong>Restantes</div>
</div>

<div class="actions-row" style="margin-top:20px">
  <button class="btn" onclick="shuffle()">🔀 Mélanger</button>
  <button class="btn" onclick="resetAll()">🔄 Recommencer</button>
</div>

<script>
const ALL = [
  // ─── BACKEND ───
  {
    cat: "backend", label: "Backend",
    q: "Qu'est-ce que Laravel et quel est son rôle dans le projet ?",
    title: "Laravel 12 — Framework PHP Backend",
    a: `<strong>Laravel</strong> est un framework PHP open-source qui facilite le développement d'applications web en fournissant des outils prêts à l'emploi.<br><br>
    <strong>Dans le projet :</strong> il constitue le <em>cerveau du backend</em>. Il gère toutes les règles métier, la communication avec la base de données, la validation des données et l'exposition de l'API REST.<br><br>
    <ul>
      <li>Version utilisée : <code>Laravel 12</code> avec PHP 8.2+</li>
      <li>Il suit le pattern <strong>MVC</strong> (Modèle-Vue-Contrôleur)</li>
      <li>Il répond aux requêtes HTTP du frontend via des <strong>routes API</strong></li>
      <li>Il protège les données avec des middlewares et de la validation</li>
    </ul>`
  },
  {
    cat: "backend", label: "Backend",
    q: "C'est quoi une API REST ? Pourquoi l'avoir utilisée ?",
    title: "API REST — Interface de Communication",
    a: `Une <strong>API REST</strong> (Application Programming Interface - Representational State Transfer) est un ensemble de règles permettant à deux applications de communiquer via le protocole HTTP.<br><br>
    <strong>Pourquoi :</strong> Le frontend React et le backend Laravel sont deux applications séparées. L'API REST est le <em>pont de communication</em> entre elles.<br><br>
    <ul>
      <li><code>GET /api/products</code> → Récupérer les produits</li>
      <li><code>POST /api/login</code> → Se connecter</li>
      <li><code>PATCH /api/vendor/products/{id}</code> → Modifier un produit</li>
      <li><code>DELETE /api/vendor/products/{id}</code> → Supprimer</li>
    </ul>
    <br>Le serveur répond toujours en <strong>JSON</strong>, un format de données universel.`
  },
  {
    cat: "backend", label: "Backend",
    q: "C'est quoi le pattern MVC et comment il est appliqué dans le projet ?",
    title: "MVC — Modèle-Vue-Contrôleur",
    a: `<strong>MVC</strong> est un patron de conception qui sépare une application en 3 couches :<br><br>
    <ul>
      <li><strong>Modèle (M)</strong> → Représente les données. Ex: <code>User.php</code>, <code>Product.php</code>. C'est la couche qui parle à la base de données.</li>
      <li><strong>Vue (V)</strong> → Ce que voit l'utilisateur. Dans notre cas, c'est le frontend React qui joue ce rôle.</li>
      <li><strong>Contrôleur (C)</strong> → Le chef d'orchestre. Ex: <code>ProductController.php</code>, <code>AuthController.php</code>. Il reçoit la requête, interroge le Modèle et renvoie une réponse.</li>
    </ul>
    <br><em>Avantage :</em> Le code est organisé, chaque partie a une responsabilité claire. On peut modifier l'interface sans toucher la base de données.`
  },
  {
    cat: "backend", label: "Backend",
    q: "À quoi sert le ProductController dans le projet ?",
    title: "ProductController — Gestion des Produits",
    a: `Le <code>ProductController</code> gère toute la logique liée aux produits.<br><br>
    <strong>Ses méthodes :</strong>
    <ul>
      <li><code>index()</code> → Retourne la liste publique (produits actifs + approuvés, avec pagination)</li>
      <li><code>show()</code> → Retourne un seul produit via son slug</li>
      <li><code>manage()</code> → Retourne les produits d'un vendeur connecté (ou tous si Admin)</li>
      <li><code>store()</code> → Crée un nouveau produit + upload image + génère un slug unique</li>
      <li><code>update()</code> → Modifie un produit (vérifie que c'est bien le propriétaire)</li>
      <li><code>destroy()</code> → Supprime un produit</li>
    </ul>
    <br><em>Sécurité :</em> avant toute modification, le code vérifie <code>$user->hasRole('Admin') || $product->user_id === $user->id</code>`
  },
  {
    cat: "backend", label: "Backend",
    q: "C'est quoi un 'slug' et comment il est généré dans le projet ?",
    title: "Slug — Identifiant URL Propre",
    a: `Un <strong>slug</strong> est une version "URL-friendly" d'un texte. Il remplace les espaces par des tirets et supprime les caractères spéciaux.<br><br>
    <strong>Exemple :</strong> "Téléphone Samsung Galaxy" → <code>telephone-samsung-galaxy</code><br><br>
    <strong>Dans le projet :</strong> chaque produit a un slug unique utilisé dans l'URL : <code>/produit/telephone-samsung-galaxy</code><br><br>
    <strong>Comment il est généré :</strong>
    <ul>
      <li>Laravel transforme le nom via <code>Str::slug()</code></li>
      <li>Si le slug existe déjà, un index est ajouté : <code>-2</code>, <code>-3</code>...</li>
      <li>Cela garantit qu'aucun produit ne partage la même URL</li>
    </ul>
    <em>Pourquoi pas l'ID ?</em> Le slug est plus lisible et meilleur pour le référencement (SEO).`
  },
  {
    cat: "backend", label: "Backend",
    q: "Qu'est-ce que la validation des données côté backend et pourquoi est-ce important ?",
    title: "Validation des Données — Laravel Validator",
    a: `La <strong>validation</strong> consiste à vérifier que les données envoyées par l'utilisateur sont correctes et conformes aux règles avant de les enregistrer.<br><br>
    <strong>Exemple concret :</strong>
    <ul>
      <li><code>'name' => ['required', 'string', 'max:255']</code> → Le nom est obligatoire, textuel, max 255 chars</li>
      <li><code>'price' => ['required', 'numeric', 'min:0']</code> → Le prix doit être un nombre positif</li>
      <li><code>'image' => ['nullable', 'image', 'max:5120']</code> → Image optionnelle, max 5 Mo</li>
      <li><code>'email' => ['required', 'email', 'unique:users,email']</code> → Email valide et unique en base</li>
    </ul>
    <br><em>Pourquoi :</em> Sans validation, n'importe qui pourrait envoyer des données corrompues ou malveillantes. C'est la première ligne de défense de l'application.`
  },

  // ─── SÉCURITÉ ───
  {
    cat: "securite", label: "Sécurité",
    q: "C'est quoi Laravel Sanctum et comment ça sécurise les routes ?",
    title: "Laravel Sanctum — Authentification par Token",
    a: `<strong>Sanctum</strong> est le système d'authentification de Laravel pour les API. Il génère des <em>tokens (jetons)</em> qui prouvent l'identité d'un utilisateur sans stocker de session serveur.<br><br>
    <strong>Comment ça marche :</strong>
    <ul>
      <li>L'utilisateur se connecte → le backend génère un token unique</li>
      <li>Le frontend stocke ce token et l'envoie dans chaque requête : <code>Authorization: Bearer {token}</code></li>
      <li>Le backend vérifie le token à chaque requête protégée</li>
      <li>À la déconnexion, le token est supprimé → accès révoqué</li>
    </ul>
    <br><strong>Dans les routes :</strong> le middleware <code>auth:sanctum</code> bloque automatiquement les requêtes sans token valide et retourne une erreur <code>401</code>.`
  },
  {
    cat: "securite", label: "Sécurité",
    q: "C'est quoi Spatie Laravel Permission et pourquoi l'utiliser ?",
    title: "Spatie Permission — Gestion des Rôles",
    a: `<strong>Spatie Laravel Permission</strong> est un package qui ajoute un système de <em>rôles et permissions</em> à Laravel. Au lieu de tout coder manuellement, il fournit les outils prêts à l'emploi.<br><br>
    <strong>Rôles dans le projet :</strong>
    <ul>
      <li><code>Client</code> → Consulte le catalogue, contacte les vendeurs</li>
      <li><code>Vendeur</code> → Gère ses produits</li>
      <li><code>Admin</code> → Supervise toute la plateforme</li>
    </ul>
    <br><strong>Usage concret :</strong>
    <ul>
      <li><code>$user->assignRole('Vendeur')</code> → Assigner un rôle</li>
      <li><code>$user->hasRole('Admin')</code> → Vérifier un rôle</li>
      <li>Middleware <code>role:Admin</code> → Protéger une route entière</li>
    </ul>`
  },
  {
    cat: "securite", label: "Sécurité",
    q: "Qu'est-ce que le hachage du mot de passe et pourquoi on ne stocke jamais un mot de passe en clair ?",
    title: "Hachage — Sécurité des Mots de Passe",
    a: `Le <strong>hachage</strong> est une transformation irréversible d'une donnée. Un mot de passe haché ne peut pas être "déhaché" pour retrouver l'original.<br><br>
    <strong>Dans le projet :</strong> <code>Hash::make($data['password'])</code> — Laravel utilise <strong>bcrypt</strong>, un algorithme de hachage robuste.<br><br>
    <strong>Pourquoi c'est essentiel :</strong>
    <ul>
      <li>Si la base de données est compromise, les mots de passe restent inutilisables</li>
      <li>Même les développeurs ne peuvent pas lire les mots de passe des utilisateurs</li>
      <li>Laravel compare avec <code>Hash::check()</code> lors de la connexion</li>
    </ul>
    <br><em>Cas concret :</em> "password123" → stocké en base comme <code>$2y$10$xK...</code> (chaîne de 60 chars illisible).`
  },
  {
    cat: "securite", label: "Sécurité",
    q: "C'est quoi un middleware dans le projet et comment il protège les routes ?",
    title: "Middleware — Gardien des Routes",

// ── STATE ──
let deck = [...ALL];
let current = 0;
let isFlipped = false;
let scores = { known: 0, unknown: 0 };
let rated = new Set();
let activeFilter = 'all';

// ── CATEGORY CONFIG ──
const cats = {
  all:        { label: '🗂️ Tout', cls: '' },
  backend:    { label: '⚙️ Backend', cls: 'cat-backend' },
  frontend:   { label: '🎨 Frontend', cls: 'cat-frontend' },
  database:   { label: '🗄️ Base de données', cls: 'cat-database' },
  archi:      { label: '🏗️ Architecture', cls: 'cat-archi' },
  securite:   { label: '🔐 Sécurité', cls: 'cat-securite' },
  devops:     { label: '🐳 DevOps', cls: 'cat-devops' },
  conception: { label: '📐 Conception', cls: 'cat-conception' },
  algo:       { label: '🧮 Algorithme', cls: 'cat-algo' },
};

// ── INIT ──
function init() {
  // Build filters
  const fEl = document.getElementById('filters');
  fEl.innerHTML = '';
  Object.entries(cats).forEach(([key, val]) => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (key === activeFilter ? ' active' : '');
    btn.textContent = val.label;
    btn.onclick = () => setFilter(key);
    fEl.appendChild(btn);
  });
  render();
}

function setFilter(key) {
  activeFilter = key;
  deck = key === 'all' ? [...ALL] : ALL.filter(c => c.cat === key);
  current = 0;
  scores = { known: 0, unknown: 0 };
  rated = new Set();
  isFlipped = false;
  document.getElementById('card').classList.remove('flipped');
  init();
}

function render() {
  if (deck.length === 0) return;
  const c = deck[current];

  // Front
  const fCat = document.getElementById('front-cat');
  fCat.textContent = cats[c.cat]?.label || c.label;
  fCat.className = 'card-category ' + (cats[c.cat]?.cls || '');
  document.getElementById('front-q').textContent = c.q;

  // Back
  const bCat = document.getElementById('back-cat');
  bCat.textContent = cats[c.cat]?.label || c.label;
  bCat.className = 'back-category ' + (cats[c.cat]?.cls || '');
  document.getElementById('back-title').textContent = c.title;
  document.getElementById('back-content').innerHTML = c.a;

  // Progress
  const pct = Math.round((current / deck.length) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `Carte ${current + 1} sur ${deck.length}`;
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('counter').textContent = `${current + 1} / ${deck.length}`;

  // Scores
  document.getElementById('s-known').textContent = scores.known;
  document.getElementById('s-unknown').textContent = scores.unknown;
  document.getElementById('s-remain').textContent = deck.length - rated.size;

  // Show/hide rating buttons
  const rr = document.getElementById('rating-row');
  rr.style.opacity = isFlipped ? '1' : '0.3';
  rr.style.pointerEvents = isFlipped ? 'auto' : 'none';
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('card').classList.toggle('flipped', isFlipped);
  render();
}

function next() {
  if (current < deck.length - 1) {
    current++;
    isFlipped = false;
    document.getElementById('card').classList.remove('flipped');
    render();
  }
}

function prev() {
  if (current > 0) {
    current--;
    isFlipped = false;
    document.getElementById('card').classList.remove('flipped');
    render();
  }
}

function rate(known) {
  if (!isFlipped) { flipCard(); return; }
  if (!rated.has(current)) {
    rated.add(current);
    if (known) scores.known++;
    else scores.unknown++;
  }
  render();
  setTimeout(() => next(), 300);
}

function shuffle() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  current = 0;
  isFlipped = false;
  scores = { known: 0, unknown: 0 };
  rated = new Set();
  document.getElementById('card').classList.remove('flipped');
  render();
}

function resetAll() {
  scores = { known: 0, unknown: 0 };
  rated = new Set();
  current = 0;
  isFlipped = false;
  document.getElementById('card').classList.remove('flipped');
  render();
}

// keyboard support
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'l') next();
  if (e.key === 'ArrowLeft' || e.key === 'j') prev();
  if (e.key === ' ') { e.preventDefault(); flipCard(); }
  if (e.key === 'y') rate(true);
  if (e.key === 'n') rate(false);
});

init();
</script>
