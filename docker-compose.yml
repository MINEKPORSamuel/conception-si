version: '3.8'

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: cs-db
    restart: always
    environment:
      MYSQL_DATABASE: marketplace
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql

  # Laravel Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cs-backend
    restart: always
    depends_on:
      - db
    ports:
      - "8000:8000"
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: marketplace
      DB_USERNAME: root
      DB_PASSWORD: root
    volumes:
      - ./backend:/var/www

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cs-frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  dbdata:
