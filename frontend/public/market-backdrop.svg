<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" fill="none">
  <defs>
    <linearGradient id="sky" x1="800" y1="0" x2="800" y2="1200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8F4EC"/>
      <stop offset="1" stop-color="#EEF5EE"/>
    </linearGradient>
    <linearGradient id="table" x1="800" y1="700" x2="800" y2="1030" gradientUnits="userSpaceOnUse">
      <stop stop-color="#DCC7A7"/>
      <stop offset="1" stop-color="#CBA980"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1D6D4F"/>
      <stop offset="1" stop-color="#5E8C4F"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#E7C39D"/>
      <stop offset="1" stop-color="#B97A48"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1600" height="1200" fill="url(#sky)"/>

  <g opacity="0.75" filter="url(#blur)">
    <ellipse cx="240" cy="220" rx="190" ry="150" fill="#D8EBD9"/>
    <ellipse cx="1360" cy="210" rx="220" ry="170" fill="#F1E2C8"/>
    <ellipse cx="1320" cy="950" rx="240" ry="190" fill="#D8EEE4"/>
    <ellipse cx="320" cy="980" rx="220" ry="180" fill="#F0DCC6"/>
  </g>

  <g opacity="0.9">
    <rect x="0" y="680" width="1600" height="520" fill="#E8D1A8"/>
    <rect x="0" y="650" width="1600" height="50" fill="#C7A26E"/>
    <rect x="120" y="280" width="1360" height="360" rx="44" fill="#FFFFFF" opacity="0.5"/>
  </g>

  <g filter="url(#soft)" opacity="0.9">
    <rect x="120" y="300" width="620" height="280" rx="32" fill="#F7F3EA"/>
    <rect x="210" y="330" width="144" height="96" rx="18" fill="#D94C3D"/>
    <rect x="370" y="330" width="144" height="96" rx="18" fill="#F0B13C"/>
    <rect x="530" y="330" width="144" height="96" rx="18" fill="#5A8E41"/>
    <rect x="210" y="440" width="144" height="96" rx="18" fill="#6EA35A"/>
    <rect x="370" y="440" width="144" height="96" rx="18" fill="#C0A56E"/>
    <rect x="530" y="440" width="144" height="96" rx="18" fill="#EF8554"/>

    <rect x="820" y="300" width="660" height="280" rx="32" fill="#FAF8F0"/>
    <rect x="860" y="330" width="140" height="220" rx="18" fill="#E3E9EF"/>
    <rect x="1020" y="330" width="140" height="220" rx="18" fill="#E7EDF4"/>
    <rect x="1180" y="330" width="140" height="220" rx="18" fill="#E2E9E2"/>
    <rect x="1340" y="330" width="100" height="220" rx="18" fill="#EEDFD2"/>

    <rect x="300" y="760" width="1000" height="170" rx="40" fill="url(#table)"/>
    <rect x="360" y="780" width="180" height="110" rx="28" fill="#F0E7D7"/>
    <rect x="570" y="780" width="180" height="110" rx="28" fill="#D85D3A"/>
    <rect x="780" y="780" width="180" height="110" rx="28" fill="#6B9B51"/>
    <rect x="990" y="780" width="180" height="110" rx="28" fill="#F3C15C"/>

    <circle cx="420" cy="540" r="64" fill="#F0AA3B"/>
    <circle cx="510" cy="540" r="64" fill="#5B9149"/>
    <circle cx="600" cy="540" r="64" fill="#D95D46"/>
    <circle cx="690" cy="540" r="64" fill="#E9C58E"/>
  </g>

  <g opacity="0.55">
    <rect x="210" y="160" width="1180" height="22" rx="11" fill="#D6C09A"/>
    <rect x="290" y="120" width="70" height="130" rx="35" fill="#D6C09A"/>
    <rect x="1230" y="120" width="70" height="130" rx="35" fill="#D6C09A"/>
    <circle cx="320" cy="140" r="26" fill="#FFF4DD"/>
    <circle cx="1285" cy="140" r="26" fill="#FFF4DD"/>
    <rect x="640" y="95" width="320" height="18" rx="9" fill="#E9DAB8"/>
